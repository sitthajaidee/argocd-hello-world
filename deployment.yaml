apiVersion: v1
kind: ConfigMap
metadata:
  name: hello-html
  namespace: hello-world
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head><title>Hello World</title></head>
    <body style="font-family:sans-serif;text-align:center;margin-top:100px">
      <h1>Hello World Round 4</h1>
      <p>Deployed by ArgoCD via GitOps</p>
      <p style="color:green;font-size:1.2em">Test Instant Deploy Round 4</p>
    </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-world
  namespace: hello-world
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-world
  template:
    metadata:
      labels:
        app: hello-world
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html
          mountPath: /usr/share/nginx/html
      volumes:
      - name: html
        configMap:
          name: hello-html
